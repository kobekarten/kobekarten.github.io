# Hand-editable Quarto project config.
# Generated once by tools/generate.py — will NOT be overwritten on subsequent runs.
# Navigation is imported from _quarto-nav.yml (always regenerated from course.yaml).

project:
  type: website
  output-dir: docs
  render:
  - "index.qmd"
  - "content/**"
  - "!content/slides/**"
  # TODO: Make this dependent on infos from course.yaml
lang: de

# Import generated navigation — do not edit _quarto-nav.yml by hand.
#metadata-files:
#  - _quarto-nav.yml

website:
  title: "Argumentlandkarten"
  description: "Kontroversen begleiten mit Argumentlandkarten"
  favicon: ""

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - content/about.qmd
      - content/team.qmd

  #sidebar: true #false

  page-footer:
    left: 
      - "Argumentlandkarten"
    right:
      - content/impressum.qmd
      - text: 'Gebaut mit <a href="https://quarto.org">Quarto</a>'

format:
  html:
    respect-user-color-scheme: true
    template-partials:
      - assets/partials/title-block.html
    theme:
      #- flatly
      #- assets/styles/custom.scss
      light: flatly
      dark: darkly
    #toc: true    #für kurze Seiten eigentlich nicht nötig
    toc-depth: 3
  pdf:
    # Required for the LaTeX svg package to call Inkscape when converting
    # inline SVG images produced by the argdown-filter (mode: inline, format: svg).
    pdf-engine-opt: "-shell-escape"

execute:
  freeze: auto
